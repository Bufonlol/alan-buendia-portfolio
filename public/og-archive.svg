<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F6F0E5"/>
      <stop offset="1" stop-color="#E8E0D0"/>
    </linearGradient>
    <pattern id="grid" width="66" height="66" patternUnits="userSpaceOnUse">
      <path d="M 66 0 H 0 V 66" fill="none" stroke="#181511" stroke-opacity=".09" stroke-width="1"/>
    </pattern>
    <filter id="blur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity=".55"/>
  <circle cx="180" cy="150" r="140" fill="#3B6BD6" fill-opacity=".08" filter="url(#blur)"/>
  <circle cx="1010" cy="120" r="120" fill="#DD4A12" fill-opacity=".07" filter="url(#blur)"/>

  <text x="54" y="72" fill="#7A7468" font-family="Arial, Helvetica, sans-serif" font-size="22" letter-spacing="3">Index / Archivo</text>
  <rect x="54" y="95" width="118" height="6" rx="3" fill="#DD4A12"/>

  <text x="54" y="196" fill="#181511" font-family="Arial, Helvetica, sans-serif" font-size="92" font-weight="800" letter-spacing="-4">Archive</text>
  <text x="54" y="276" fill="#DD4A12" font-family="Arial, Helvetica, sans-serif" font-size="92" font-weight="800" letter-spacing="-4">every system</text>

  <g transform="translate(54 322)">
    <text x="0" y="0" fill="#181511" font-family="Arial, Helvetica, sans-serif" font-size="28">Shipped, in progress, or retired.</text>
