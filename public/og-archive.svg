    <text x="328" y="32" text-anchor="middle" fill="#181511" font-family="Arial, Helvetica, sans-serif" font-size="18">Inventory System</text>
    <rect x="446" y="0" width="166" height="50" rx="25" fill="rgba(255,255,255,.42)" stroke="#181511" stroke-opacity=".14"/>
    <text x="529" y="32" text-anchor="middle" fill="#181511" font-family="Arial, Helvetica, sans-serif" font-size="18">Kybernet</text>
