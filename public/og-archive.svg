    <rect x="20" y="22" width="322" height="18" rx="9" fill="#181511" fill-opacity=".85"/>
    <rect x="20" y="54" width="284" height="12" rx="6" fill="#181511" fill-opacity=".18"/>
    <rect x="20" y="82" width="322" height="1" fill="#181511" fill-opacity=".10"/>
